# Production-parity compose file.
#
# Used two ways:
#   1. Locally:  `docker compose up --build`  to run the production image exactly
#      as the server will (needs Docker Desktop).
#   2. On the server: Coolify can deploy straight from this file, or you can run
#      it manually on a plain Hetzner box.
#
# Secrets come from a `.env` file next to this one (copy .env.local.example).
# The NEXT_PUBLIC_* values are needed at BUILD time, so they are passed as args.

services:
  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    image: anima-temple:latest
    env_file:
      - .env
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
