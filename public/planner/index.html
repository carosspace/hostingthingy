<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Magalis Planner</title>
<meta name="theme-color" content="#8E6C9E">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Magali">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500;600&family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#FBF2F8;
  --cream-deep:#F3E4EE;
  --card:#FFFBFD;
  --card-2:#FBF0F7;
  --espresso:#4A2C46;
  --espresso-soft:#6E4F6A;
  --ink-mute:#A98BA6;
  --clay:#B08AAE;
  --sage:#7FB59F;
  --sage-soft:#B6D6C7;
  --gold:#B06FB8;
  --gold-bright:#CE9BD6;
  --gold-wash:#F4E4F4;
  --terra:#D178A0;
  --line:rgba(74,44,70,.12);
  --line-soft:rgba(74,44,70,.07);
  --shadow:0 1px 2px rgba(74,44,70,.05),0 8px 24px rgba(74,44,70,.06);
  --nav-w:252px;
  --radius:10px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body.dark{
  --cream:#1A1218;
  --cream-deep:#221820;
  --card:#241A22;
  --card-2:#2C2029;
  --espresso:#F2E6EE;
  --espresso-soft:#CBB4C4;
  --ink-mute:#9C8593;
  --clay:#CDA6C4;
  --sage:#8FB39B;
  --sage-soft:#3A4A40;
  --gold:#C98FD0;
  --gold-bright:#E0B3E6;
  --gold-wash:#3A2A3A;
  --terra:#DB7FA8;
  --line:rgba(242,230,238,.13);
  --line-soft:rgba(242,230,238,.07);
  --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 30px rgba(0,0,0,.5);
}
body.dark .starbtn{background:var(--card-2);color:var(--gold-bright);border-color:var(--gold)}
body.dark .hero{background:linear-gradient(135deg,#3A2438,#241522);color:#F3E7EF}
body.dark .navscrim{background:rgba(0,0,0,.5)}
.themebtn{width:38px;height:38px;border-radius:50%;border:1px solid var(--line);background:var(--card);color:var(--gold);display:grid;place-items:center;font-size:17px;line-height:1;cursor:pointer;transition:.16s;flex-shrink:0}
.themebtn:hover{border-color:var(--gold);transform:scale(1.05)}
body{
  background:var(--cream);
  color:var(--espresso);
  font-family:'Jost',system-ui,sans-serif;
  font-weight:400;
  font-size:15px;
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;margin:0;line-height:1.15;color:var(--espresso)}
.eyebrow{font-family:'Cinzel',serif;text-transform:uppercase;letter-spacing:.22em;font-size:10.5px;color:var(--gold);font-weight:500}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;color:var(--espresso)}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:4px}
::selection{background:var(--gold-wash)}

/* ---------- LAYOUT ---------- */
.app{display:flex;min-height:100vh}
.main{flex:1;min-width:0;padding:0 clamp(18px,4vw,52px) 120px;max-width:1180px;margin:0 auto;width:100%}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:calc(env(safe-area-inset-top,0px) + 20px) 0 18px 60px;gap:16px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:12px}
.brand .star{color:var(--gold);font-size:20px;line-height:1}
.brand .name{font-family:'Cinzel',serif;letter-spacing:.2em;font-size:14px;text-transform:uppercase;color:var(--espresso)}
.brand .sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;color:var(--ink-mute);margin-left:2px}
.topmeta{display:flex;align-items:center;gap:14px}
.datechip{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--espresso-soft)}
.icon-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--line);display:grid;place-items:center;color:var(--clay);background:var(--card);transition:.18s}
.icon-btn:hover{border-color:var(--gold);color:var(--gold)}

/* ---------- RIGHT NAV ---------- */
.starbtn{position:fixed;top:calc(env(safe-area-inset-top,0px) + 13px);left:15px;z-index:80;width:46px;height:46px;border-radius:50%;background:var(--espresso);color:var(--gold-bright);border:1px solid var(--gold);display:grid;place-items:center;font-size:21px;line-height:1;box-shadow:var(--shadow);cursor:pointer;transition:transform .16s}
.starbtn:hover{transform:scale(1.06)}
.starbtn:active{transform:scale(.96)}
.navscrim{position:fixed;inset:0;background:rgba(28,17,7,.34);backdrop-filter:blur(2px);z-index:78;opacity:0;pointer-events:none;transition:opacity .2s}
.app.nav-open .navscrim{opacity:1;pointer-events:auto}
.nav{
  position:fixed;top:0;left:0;height:100vh;width:252px;z-index:79;
  background:linear-gradient(180deg,var(--card) 0%,var(--card-2) 100%);
  border-right:1px solid var(--line);
  padding:calc(env(safe-area-inset-top,0px) + 72px) 16px calc(env(safe-area-inset-bottom,0px) + 20px);display:flex;flex-direction:column;gap:4px;
  overflow-y:auto;transform:translateX(-104%);transition:transform .22s ease;
  box-shadow:8px 0 40px rgba(44,26,10,.12);
}
.app.nav-open .nav{transform:none}
.nav .nav-head{padding:0 8px 16px}
.nav .nav-head .k{font-family:'Cinzel',serif;letter-spacing:.18em;font-size:11px;text-transform:uppercase;color:var(--gold)}
.nav .nav-head .d{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--espresso);margin-top:2px}
.navlink{
  display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:9px;
  color:var(--espresso-soft);font-size:14.5px;letter-spacing:.02em;transition:.16s;text-align:left;width:100%;flex-shrink:0;
}
.navlink svg{width:18px;height:18px;flex-shrink:0;stroke:currentColor;stroke-width:1.4;fill:none}
.navlink:hover{background:var(--gold-wash);color:var(--espresso)}
.navlink.active{background:var(--espresso);color:var(--cream)}
.navlink.active svg{stroke:var(--gold-bright)}
.nav-foot{margin-top:auto;padding:16px 6px 0;border-top:1px solid var(--line-soft);flex-shrink:0}
.nav-settings{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border-radius:9px;color:var(--espresso-soft);font-size:13.5px;background:none;border:none;cursor:pointer;text-align:left;margin-bottom:8px;transition:.16s}
.nav-settings svg{stroke:var(--clay)}
.nav-settings:hover{background:var(--gold-wash);color:var(--espresso)}
.nav-foot small{color:var(--ink-mute);font-style:italic;font-family:'Cormorant Garamond',serif;font-size:13px;padding:0 12px;display:block}

/* ---------- GENERIC ---------- */
.view-head{margin:8px 0 26px;position:relative}
.view-head h1{font-size:clamp(34px,5vw,46px);letter-spacing:-.01em}
.view-head .lead{color:var(--ink-mute);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:19px;margin-top:4px}
.moonchip{display:inline-flex;align-items:center;color:var(--gold);vertical-align:middle}
.moonchip .moon{display:block}
.moon-tr{position:absolute;top:4px;right:2px;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--gold)}
.moon-tr .moon-lab{font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-mute);white-space:nowrap}
.month-moon{display:flex;justify-content:flex-end;align-items:center;color:var(--gold);margin-bottom:2px;padding-right:2px}
.astro-big{font-family:'Cormorant Garamond',serif;font-size:23px;color:var(--espresso);display:flex;align-items:center;gap:7px;line-height:1.2}
.astro-ev{display:grid;grid-template-columns:30px 30px 1fr;gap:12px;align-items:start;padding:11px 0;border-bottom:1px solid var(--line-soft)}
.dp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.dp-title{font-family:'Cormorant Garamond',serif;font-size:19px;color:var(--espresso)}
.dp-nav{width:32px;height:32px;border-radius:50%;border:1px solid var(--line);background:var(--card);cursor:pointer;color:var(--espresso);font-size:16px;line-height:1}
.dp-nav:hover{border-color:var(--gold)}
.dp-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px}
.dp-dow span{text-align:center;font-size:10px;color:var(--ink-mute);text-transform:uppercase;letter-spacing:.05em}
.dp-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.dp-cell{height:36px;border:none;background:transparent;border-radius:9px;font-size:13.5px;color:var(--espresso);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.12s}
.dp-cell:hover:not(.dp-empty){background:var(--gold-wash)}
.dp-cell.dp-empty{cursor:default}
.dp-cell.today{box-shadow:inset 0 0 0 1.5px var(--gold)}
.dp-cell.sel{background:var(--espresso);color:var(--cream)}
.dp-foot{display:flex;justify-content:space-between;margin-top:16px}
.astro-now-ev{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line-soft)}
.astro-now-ev:last-child{border-bottom:none}
.astro-now-ev .ae-glyph{font-size:19px;line-height:1;width:24px;text-align:center;flex-shrink:0;padding-top:2px}
.astro-now-ev .ae-body{flex:1;min-width:0}
.astro-ev:last-child{border-bottom:none}
.ae-date{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold);text-align:center;line-height:1.1}
.ae-icon{display:flex;align-items:center;justify-content:center;padding-top:3px}
.ae-icon .moonchip{color:var(--gold)}
.ae-sign{font-size:20px;color:var(--gold)}
.ae-glyph{font-size:19px;line-height:1}
.ae-glyph.terra{color:var(--terra)}
.ae-glyph.sage{color:var(--sage)}
.ae-title{font-size:14.5px;color:var(--espresso)}
.ae-mean{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:var(--ink-mute);margin-top:2px;line-height:1.4}
.ae-ritual{font-size:12.5px;color:var(--gold);margin-top:6px;line-height:1.45;background:var(--gold-wash);padding:7px 10px;border-radius:8px}
.jr-prompt{background:linear-gradient(135deg,var(--gold-wash),var(--card));display:flex;flex-direction:column;gap:4px}
.jr-prompt-text{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--espresso);font-style:italic}
.jr-new-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.jr-new-head input[type=date]{width:150px}
.jr-newbox{min-height:120px;font-size:15px;line-height:1.6}
.jr-entry .jr-date{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.jr-entry textarea{border:none;background:none;box-shadow:none;padding:0;font-size:14.5px;line-height:1.6;min-height:40px}
.jr-entry textarea:focus{outline:none}
.chip.rep-on{color:var(--gold);border-color:var(--gold);opacity:1}
.notes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
.notecard{position:relative;border:1px solid var(--line);border-radius:12px;padding:16px 14px 12px;box-shadow:var(--shadow);min-height:150px;display:flex}
.notecard textarea{flex:1;border:none;background:none;box-shadow:none;padding:0;font-size:14px;line-height:1.55;resize:none;color:var(--espresso);font-family:inherit}
.notecard textarea:focus{outline:none}
.notecard textarea::placeholder{color:var(--ink-mute)}
.note-x{position:absolute;top:5px;right:8px;background:none;border:none;color:var(--ink-mute);font-size:18px;cursor:pointer;opacity:.45;line-height:1;padding:2px}
.note-x:hover{opacity:1;color:var(--terra)}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow)}
.card.flat{box-shadow:none;background:var(--card-2)}
.grid{display:grid;gap:18px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
.sec-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px}
.sec-title h3{font-size:24px}
.divider{height:1px;background:var(--line-soft);margin:22px 0}

.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:8px;font-size:13.5px;letter-spacing:.02em;font-weight:500;transition:.16s;border:1px solid transparent}
.btn.primary{background:var(--gold);color:#fff}
.btn.primary:hover{background:#9c7b41}
.btn.ghost{border-color:var(--line);color:var(--clay);background:var(--card)}
.btn.ghost:hover{border-color:var(--gold);color:var(--gold)}
.btn.small{padding:6px 11px;font-size:12.5px}

.qadd{display:flex;gap:8px;align-items:center;margin-bottom:2px}
.qadd input{flex:1;padding:11px 14px;border:1px solid var(--line);border-radius:9px;background:var(--card);font-size:14px}
.qadd input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-wash)}
input,textarea,select{border:1px solid var(--line);border-radius:8px;background:var(--card);padding:8px 10px;font-size:13.5px}
textarea{width:100%;resize:vertical;line-height:1.5}
textarea:focus,input:focus,select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-wash)}

/* ---------- TASK ROW ---------- */
.task{display:flex;align-items:flex-start;gap:12px;padding:11px 12px;border-radius:9px;border:1px solid var(--line-soft);background:var(--card);margin-bottom:8px;transition:.14s}
.task:hover{border-color:var(--line)}
.task.done{opacity:.6}
.task.done .t-title{text-decoration:line-through;text-decoration-color:var(--sage)}
.dot{width:20px;height:20px;border-radius:50%;border:2px solid var(--clay);flex-shrink:0;margin-top:2px;position:relative;transition:.16s;cursor:pointer}
.dot.doing{border-color:var(--gold);background:var(--gold-wash)}
.dot.doing::after{content:"";position:absolute;inset:3px;border-radius:50%;background:var(--gold);clip-path:inset(0 50% 0 0)}
.dot.done{border-color:var(--sage);background:var(--sage)}
.dot.done::after{content:"✓";position:absolute;inset:0;display:grid;place-items:center;color:#fff;font-size:11px}
.t-body{flex:1;min-width:0}
.t-title{font-size:14.5px;line-height:1.4;cursor:text;border-radius:4px;padding:1px 3px;margin:-1px -3px}
.t-title[contenteditable]:focus{outline:none;background:var(--gold-wash)}
.t-meta{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap}
.chip{font-size:11px;letter-spacing:.04em;padding:3px 8px;border-radius:20px;border:1px solid var(--line);color:var(--ink-mute);background:var(--card-2);display:inline-flex;gap:5px;align-items:center;cursor:pointer}
.chip.due{color:var(--clay)}
.chip.overdue{color:var(--terra);border-color:var(--terra);background:#fbeee8}
.chip.p-high{color:var(--terra);border-color:rgba(168,92,64,.4)}
.chip.p-med{color:var(--gold);border-color:rgba(176,141,79,.4)}
.chip.p-low{color:var(--sage);border-color:rgba(126,144,112,.4)}
.chip select,.chip input{border:none;background:none;padding:0;font-size:11px;color:inherit;box-shadow:none}
.t-del{color:var(--ink-mute);opacity:0;font-size:16px;padding:2px 6px;transition:.14s;line-height:1}
.task:hover .t-del{opacity:.6}
.t-del:hover{opacity:1;color:var(--terra)}

.empty{text-align:center;padding:34px 18px;color:var(--ink-mute)}
.empty .e-star{color:var(--gold-bright);font-size:22px}
.empty p{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;margin:6px 0 0}

/* ---------- DAY / HOURS ---------- */
.day-grid{display:grid;grid-template-columns:1.15fr 1fr;gap:22px}
.hourrow{display:flex;align-items:center;gap:12px;padding:5px 0;border-bottom:1px solid var(--line-soft)}
.hourrow .hr{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--ink-mute);width:52px;flex-shrink:0;text-align:right}
.hourrow input{flex:1;border:none;background:none;box-shadow:none;padding:7px 8px;border-radius:6px}
.hourrow input:focus{background:var(--gold-wash)}
.hourrow.now .hr{color:var(--terra);font-weight:500}
.hourrow.now{background:linear-gradient(90deg,rgba(168,92,64,.06),transparent)}
.hourrow .hourcat{flex-shrink:0;width:118px;font-size:11px;border:1px solid var(--line);border-radius:16px;background:var(--card-2);padding:5px 7px;color:var(--ink-mute);-webkit-appearance:none;appearance:none;cursor:pointer}
.hourrow .hourcat:focus{outline:none;box-shadow:0 0 0 3px var(--gold-wash)}
@media(max-width:520px){.hourrow .hourcat{width:70px}}

/* ---------- CALENDAR ---------- */
.calhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.calnav{display:flex;gap:8px;align-items:center}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.cal-dow{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);text-align:center;padding-bottom:4px}
.cell{min-height:92px;border:1px solid var(--line-soft);border-radius:9px;padding:8px;background:var(--card);cursor:pointer;transition:.14s;display:flex;flex-direction:column;gap:4px}
.cell:hover{border-color:var(--gold)}
.cell.out{opacity:.4}
.cell.today{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold-wash)}
.cell .n{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--espresso)}
.cell .pips{display:flex;gap:3px;flex-wrap:wrap;margin-top:auto}
.pip{width:6px;height:6px;border-radius:50%;background:var(--clay)}
.pip.done{background:var(--sage)}
.pip.doing{background:var(--gold)}
.cell .cnt{font-size:11px;color:var(--ink-mute)}

/* year months */
.mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.mcard{border:1px solid var(--line);border-radius:var(--radius);padding:16px;background:var(--card);cursor:pointer;transition:.16s}
.mcard:hover{border-color:var(--gold);transform:translateY(-2px)}
.mcard.cur{border-color:var(--gold);background:var(--gold-wash)}
.mcard .mn{font-family:'Cormorant Garamond',serif;font-size:24px}
.mcard .ms{font-size:12px;color:var(--ink-mute);margin-top:6px}

/* week */
.weekgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:12px}
.wcol{background:var(--card);border:1px solid var(--line-soft);border-radius:9px;padding:12px;min-height:120px}
.wcol.today{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold-wash)}
.wcol h4{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold)}
.wcol .wd{font-family:'Cormorant Garamond',serif;font-size:22px;margin:2px 0 8px}
.wtask{font-size:12.5px;padding:5px 7px;border-radius:6px;background:var(--card-2);margin-bottom:5px;display:flex;gap:6px;align-items:center;cursor:pointer}
.wtask .wdot{width:8px;height:8px;border-radius:50%;background:var(--clay);flex-shrink:0}
.wtask .wdot.done{background:var(--sage)}
.wtask .wdot.doing{background:var(--gold)}

/* ---------- KANBAN (projects) ---------- */
.board{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:start}
.col{background:var(--card-2);border:1px solid var(--line-soft);border-radius:var(--radius);padding:12px;min-height:120px}
.col h4{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;color:var(--espresso-soft)}
.col h4 .num{color:var(--ink-mute);font-family:'Jost'}
.col.col-started h4{color:var(--clay)}
.col.col-progress h4{color:var(--gold)}
.col.col-finished h4{color:var(--sage)}
.col.col-published h4{color:var(--terra)}
.pcard{background:var(--card);border:1px solid var(--line);border-radius:9px;padding:12px;margin-bottom:10px;box-shadow:var(--shadow)}
.pcard .pname{font-family:'Cormorant Garamond',serif;font-size:19px;line-height:1.2}
.pcard textarea{margin-top:8px;font-size:12.5px;min-height:44px;background:var(--card-2)}
.pcard .pfoot{display:flex;justify-content:space-between;align-items:center;margin-top:9px}
.movebtns{display:flex;gap:5px}
.movebtns button{width:24px;height:24px;border:1px solid var(--line);border-radius:6px;color:var(--clay);display:grid;place-items:center;font-size:13px;background:var(--card)}
.movebtns button:hover{border-color:var(--gold);color:var(--gold)}
.movebtns button:disabled{opacity:.3;cursor:default}
.pcard .pname{overflow-wrap:anywhere}
.pcard .pfoot{flex-wrap:wrap;gap:8px 10px}
.pcard .pdate{white-space:nowrap}
@media(max-width:900px){.board{grid-template-columns:repeat(2,1fr)}}
@media(max-width:540px){.board{grid-template-columns:1fr}}
.pdate{font-size:11px;color:var(--ink-mute)}

/* ---------- BILLS ---------- */
.billrow{display:grid;grid-template-columns:26px 1fr auto auto 26px;gap:12px;align-items:center;padding:12px;border:1px solid var(--line-soft);border-radius:9px;background:var(--card);margin-bottom:9px}
.billrow.paid{opacity:.55}
.billrow.paid .bname{text-decoration:line-through}
.bname{font-size:14.5px}
.bmeta{font-size:11.5px;color:var(--ink-mute)}
.bamt{font-family:'Cormorant Garamond',serif;font-size:20px;text-align:right}
.check{width:22px;height:22px;border-radius:6px;border:2px solid var(--clay);display:grid;place-items:center;cursor:pointer;color:transparent}
.check.on{background:var(--sage);border-color:var(--sage);color:#fff}
.bstat{display:flex;gap:18px;flex-wrap:wrap;margin-top:4px}
.bstat .s{}
.bstat .s .lab{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-mute);font-family:'Cinzel',serif}
.bstat .s .val{font-family:'Cormorant Garamond',serif;font-size:26px}
.bstat .s .val.terra{color:var(--terra)}
.bstat .s .val.sage{color:var(--sage)}

/* ---------- BUDGET ---------- */
.budget-top{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:stretch}
.stat3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:2px 0 18px}
.statbox{border:1px solid var(--line);border-radius:9px;padding:14px 16px;background:var(--card)}
.statbox .lab{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold)}
.statbox .val{font-family:'Cormorant Garamond',serif;font-size:30px;margin-top:3px}
.statbox .val.sage{color:var(--sage)}
.statbox .val.terra{color:var(--terra)}
.moneyrow{display:grid;grid-template-columns:1fr auto auto 24px;gap:10px;align-items:center;padding:7px 0;border-bottom:1px solid var(--line-soft)}
.moneyrow input{background:none;border:none;box-shadow:none;padding:4px 6px}
.moneyrow input:focus{background:var(--gold-wash);border-radius:5px}
.moneyrow .amt{width:110px;text-align:right;font-family:'Cormorant Garamond',serif;font-size:16px}
.legend{display:flex;flex-direction:column;gap:9px;margin-top:6px}
.legend .li{display:flex;align-items:center;gap:9px;font-size:13px}
.legend .sw{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.legend .amt{margin-left:auto;font-family:'Cormorant Garamond',serif;color:var(--espresso-soft)}
.bar{height:9px;border-radius:6px;background:var(--card-2);overflow:hidden;margin-top:6px}
.bar > span{display:block;height:100%}

/* business */
.bplan .field{margin-bottom:18px}
.bplan .field label{display:block;font-family:'Cinzel',serif;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.bplan textarea{min-height:64px}

/* dashboard */
.hero{background:linear-gradient(135deg,var(--espresso),#5E3A58);color:var(--cream);border-radius:14px;padding:30px 32px;margin-bottom:22px;position:relative;overflow:hidden}
.hero::after{content:"✦";position:absolute;right:26px;top:18px;font-size:120px;color:rgba(255,255,255,.16);line-height:1}
.hero .k{font-family:'Cinzel',serif;letter-spacing:.2em;font-size:11px;text-transform:uppercase;color:var(--gold-bright)}
.hero h1{color:var(--cream);font-size:clamp(30px,4.5vw,42px);margin:6px 0 4px}
.hero p{color:rgba(244,237,225,.72);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:19px;margin:0}
.mini{display:flex;align-items:baseline;gap:8px}
.mini .n{font-family:'Cormorant Garamond',serif;font-size:34px}
.mini .l{font-size:12px;color:var(--ink-mute);letter-spacing:.03em}

.modal-bg{position:fixed;inset:0;background:rgba(28,17,7,.42);backdrop-filter:blur(3px);display:none;place-items:center;z-index:50;padding:20px}
.modal-bg.on{display:grid}
.modal{background:var(--card);border-radius:14px;padding:26px;max-width:440px;width:100%;box-shadow:0 30px 60px rgba(0,0,0,.3)}
.modal h3{font-size:26px;margin-bottom:4px}
.modal .row{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.ta-note{color:var(--ink-mute);font-size:12.5px;margin-top:14px;font-style:italic;font-family:'Cormorant Garamond',serif;font-size:15px}

/* ---------- BRAINSTORM ---------- */
.bs-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.boardchips{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.boardchip{padding:6px 12px;border-radius:20px;border:1px solid var(--line);background:var(--card);font-size:12.5px;color:var(--clay);cursor:pointer;transition:.14s}
.boardchip:hover{border-color:var(--gold)}
.boardchip.active{background:var(--espresso);color:var(--cream);border-color:var(--espresso)}
.boardchip[contenteditable]{cursor:text;outline:none}
.boardchip[contenteditable]:focus{box-shadow:0 0 0 3px var(--gold-wash)}
.bs-layout{display:grid;grid-template-columns:1fr 340px;gap:18px;align-items:start}
.canvaswrap{border:1px solid var(--line);border-radius:var(--radius);background:
  radial-gradient(circle at 1px 1px,rgba(44,26,10,.06) 1px,transparent 0) 0 0/22px 22px,var(--card);
  overflow:auto;position:relative;height:min(66vh,620px);box-shadow:var(--shadow)}
.bcanvas{position:relative;width:1400px;height:900px;min-width:100%;min-height:100%}
.bconnectors{position:absolute;inset:0;width:1400px;height:900px;pointer-events:none;z-index:1}
.bnode{position:absolute;z-index:2;max-width:220px;min-width:96px;background:var(--card);border:1.5px solid var(--clay);border-radius:14px;padding:11px 14px;box-shadow:var(--shadow);cursor:grab;user-select:none;transition:border-color .14s,box-shadow .14s}
.bnode:active{cursor:grabbing}
.bnode.seed{background:var(--espresso);border-color:var(--gold);border-width:2px}
.bnode.seed .bnode-text{color:var(--cream);font-size:18px}
.bnode.sel{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-wash),var(--shadow)}
.bnode-text{font-family:'Cormorant Garamond',serif;font-size:16px;line-height:1.25;color:var(--espresso);outline:none;word-break:break-word}
.bnode-text[contenteditable="true"]{background:var(--gold-wash);border-radius:5px;padding:2px 4px;margin:-2px -4px;cursor:text}
.bnode.seed .bnode-text[contenteditable="true"]{background:rgba(255,255,255,.22);color:var(--cream)}
.bnode-ctrls{display:none;gap:5px;margin-top:9px}
.bnode.sel .bnode-ctrls{display:flex}
.bnode-ctrl{width:26px;height:26px;border-radius:7px;border:1px solid var(--line);background:var(--card);color:var(--clay);display:grid;place-items:center;font-size:14px;cursor:pointer;line-height:1}
.bnode.seed .bnode-ctrl{background:rgba(255,255,255,.1);border-color:rgba(201,169,110,.4);color:var(--gold-bright)}
.bnode-ctrl:hover{border-color:var(--gold);color:var(--gold)}
.bnode-ctrl.del:hover{border-color:var(--terra);color:var(--terra)}
.bs-hint{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--ink-mute);font-size:15px;margin-top:8px}
.bs-left{position:relative}
.bcanvas-scale{position:relative;width:1400px;height:900px;overflow:hidden}
.bcanvas{transform-origin:0 0}
.zoombar{position:absolute;top:12px;right:12px;z-index:6;display:flex;gap:3px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:22px;padding:4px;box-shadow:var(--shadow)}
.zoombar button{width:30px;height:30px;border-radius:50%;border:none;background:none;color:var(--clay);font-size:17px;line-height:1;display:grid;place-items:center;cursor:pointer;transition:.14s}
.zoombar button:hover{background:var(--gold-wash);color:var(--gold)}
.zoombar .zlbl{width:auto;min-width:46px;padding:0 6px;font-size:12px;border-radius:14px}
.zoombar .zfit{width:auto;padding:0 12px;font-size:11.5px;letter-spacing:.05em;font-family:'Cinzel',serif;text-transform:uppercase;color:var(--gold)}
.app.nav-hidden .nav{display:none}
#navrestore{position:fixed;top:16px;right:16px;z-index:60;display:none;align-items:center;gap:7px;padding:9px 15px;border-radius:22px;background:var(--espresso);color:var(--cream);font-family:'Cinzel',serif;letter-spacing:.16em;font-size:10.5px;text-transform:uppercase;box-shadow:var(--shadow);border:1px solid var(--gold);cursor:pointer}
#navrestore .st{color:var(--gold-bright);font-size:13px}
#navrestore:hover{background:#5E3A58}
.app.nav-hidden #navrestore{display:inline-flex}
.planpanel{position:sticky;top:14px}
.plan-empty{text-align:center;padding:20px 14px}
.phase{margin-bottom:16px}
.phase-title{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;display:flex;gap:8px;align-items:center}
.phase-title .pn{width:20px;height:20px;border-radius:50%;background:var(--gold-wash);color:var(--gold);display:grid;place-items:center;font-family:'Jost';font-size:11px}
.pstep{display:flex;gap:9px;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--line-soft)}
.pstep .pbox{width:17px;height:17px;border-radius:5px;border:2px solid var(--clay);flex-shrink:0;margin-top:2px;cursor:pointer;display:grid;place-items:center;color:transparent;font-size:10px}
.pstep .pbox.on{background:var(--sage);border-color:var(--sage);color:#fff}
.pstep.done .ptext{text-decoration:line-through;color:var(--ink-mute)}
.ptext{font-size:13.5px;line-height:1.4}
.spinner{width:26px;height:26px;border:3px solid var(--gold-wash);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.keyrow{margin-top:12px}
.keyrow input{width:100%;font-size:12px}
.keyrow summary{cursor:pointer;color:var(--ink-mute);font-size:12px;font-style:italic;font-family:'Cormorant Garamond',serif;font-size:14px}
/* ---------- HOME / CLOCK / AGENDA ---------- */
.homehero .clock{font-family:'Cormorant Garamond',serif;font-size:52px;line-height:1;color:var(--gold-bright);margin:6px 0 2px}
.intent-bar{display:flex;align-items:center;gap:14px;padding:11px 18px;background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:18px;box-shadow:var(--shadow)}
.intent-bar .ib-label{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);white-space:nowrap;flex-shrink:0}
.intent-bar input{flex:1;border:none;background:none;box-shadow:none;padding:3px 2px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;color:var(--espresso)}
.intent-bar input:focus{outline:none}
.intent-bar input::placeholder{color:var(--ink-mute);font-style:italic}
.agenda{display:flex;flex-direction:column}
.ag-row{display:flex;gap:14px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--line-soft)}
.ag-row .ag-time{font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--ink-mute);width:56px;flex-shrink:0}
.ag-row .ag-text{font-size:14px;padding-top:1px}
.ag-row.now{background:linear-gradient(90deg,var(--gold-wash),transparent);border-radius:8px;margin:0 -8px;padding-left:8px;padding-right:8px}
.ag-row.now .ag-time{color:var(--terra);font-weight:500}
/* ---------- RITUALS ---------- */
.ritual{display:flex;align-items:center;gap:11px;padding:9px 4px;border-bottom:1px solid var(--line-soft)}
.ritual.done .rname{color:var(--ink-mute)}
.rcheck{width:24px;height:24px;border-radius:8px;border:2px solid var(--clay);flex-shrink:0;display:grid;place-items:center;color:transparent;font-size:12px;cursor:pointer;transition:.14s}
.rcheck.on{background:var(--gold);border-color:var(--gold);color:#fff}
.ricon{font-size:18px;width:22px;text-align:center;flex-shrink:0}
.ricon-btn{font-size:18px;width:26px;text-align:center;flex-shrink:0;background:none;border:none;cursor:pointer;padding:2px;border-radius:6px;line-height:1}
.ricon-btn:hover{background:var(--gold-wash)}
.rname{font-size:14.5px;flex:1}
.rstreak{font-size:11px;color:var(--gold);background:var(--gold-wash);padding:2px 8px;border-radius:12px}
.ritual .t-del{opacity:0}
.ritual:hover .t-del{opacity:.5}
/* ---------- TASK CATEGORY ---------- */
.t-titlerow{display:flex;gap:7px;align-items:baseline}
.t-icon{font-size:15px;flex-shrink:0}
.catchip{border:1px solid var(--line);background:var(--card-2);color:var(--ink-mute);border-radius:20px;font-size:11px;padding:3px 8px;letter-spacing:.03em;cursor:pointer;max-width:160px;-webkit-appearance:none;appearance:none}
.catchip:focus{outline:none;box-shadow:0 0 0 3px var(--gold-wash)}
/* ---------- LEGEND EDITOR ---------- */
.legend-edit{display:flex;flex-direction:column;gap:9px;margin-top:6px}
.leg-row{display:grid;grid-template-columns:40px 36px 1fr 26px;gap:9px;align-items:center}
.leg-row input[type=color]{width:40px;height:32px;padding:2px;border:1px solid var(--line);border-radius:8px;background:var(--card);cursor:pointer}
.leg-icon{width:36px;height:32px;border:1px solid var(--line);border-radius:8px;background:var(--card);font-size:17px;cursor:pointer;line-height:1}
.leg-icon:hover{border-color:var(--gold)}
.leg-label{font-size:13.5px}
.legendstrip{display:flex;gap:12px;flex-wrap:wrap;margin-top:14px;padding-top:12px;border-top:1px solid var(--line-soft)}
.legendstrip .lg{font-size:12px;color:var(--espresso-soft);display:inline-flex;align-items:center;gap:6px}
.legendstrip .lg-sw{width:11px;height:11px;border-radius:3px;display:inline-block}
/* ---------- MONEY / ABUNDANCE ---------- */
.money-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;border-bottom:1px solid var(--line);padding-bottom:2px}
.mtab{padding:9px 16px;border-radius:9px 9px 0 0;font-size:13.5px;letter-spacing:.02em;color:var(--clay);border:1px solid transparent;border-bottom:none;background:none;cursor:pointer;transition:.14s}
.mtab:hover{color:var(--gold);background:var(--gold-wash)}
.mtab.active{background:var(--card);border-color:var(--line);color:var(--espresso);font-weight:500}
.mealgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;margin-top:16px}
.mealday{border:1px solid var(--line);border-radius:12px;padding:12px 12px 6px;background:var(--card-2)}
.mealday.today{border-color:var(--gold);box-shadow:inset 0 0 0 1px var(--gold)}
.md-head{font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--espresso);margin-bottom:9px;display:flex;justify-content:space-between;align-items:baseline}
.md-head span{font-size:11.5px;color:var(--ink-mute);font-family:'Jost',sans-serif}
.mealslot{display:block;margin-bottom:8px}
.mealslot span{display:block;font-size:9.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-mute);margin-bottom:3px}
.mealslot input{width:100%;box-sizing:border-box;border:1px solid var(--line);border-radius:8px;background:var(--card);padding:7px 9px;font-size:13px;color:var(--espresso)}
.mealslot input:focus{outline:none;box-shadow:0 0 0 3px var(--gold-wash);border-color:var(--gold)}
.kwk-nav{display:flex;align-items:center;justify-content:space-between;gap:10px}
.kwk-label{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--espresso)}
.bigmoney{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:10px;padding:8px 14px;background:var(--card)}
.bigmoney span{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--gold)}
.bigmoney input{border:none;background:none;box-shadow:none;font-family:'Cormorant Garamond',serif;font-size:28px;width:100%;padding:0}
.bigmoney input:focus{outline:none;box-shadow:none}
.exprow{display:grid;grid-template-columns:40px 36px 1fr 100px 24px;gap:9px;align-items:center;padding:6px 0;border-bottom:1px solid var(--line-soft)}
.exprow input[type=color]{width:40px;height:32px;padding:2px;border:1px solid var(--line);border-radius:8px;background:var(--card);cursor:pointer}
.exprow .exp-label{font-size:13.5px}
.exprow .amt{text-align:right;font-family:'Cormorant Garamond',serif;font-size:17px}
.progress{height:10px;border-radius:8px;background:var(--card-2);overflow:hidden;margin:10px 0}
.progress > span{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-bright));border-radius:8px}
.goalcard{border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:12px;background:var(--card)}
.ex-head,.ex-row{display:grid;grid-template-columns:1fr 52px 64px 72px 24px;gap:7px;align-items:center}
.ex-head{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);margin:10px 0 4px;padding:0 2px}
.ex-row{margin-bottom:6px}
.ex-row input{font-size:12.5px;padding:6px 8px}
@media(max-width:520px){.ex-head,.ex-row{grid-template-columns:1fr 42px 50px 56px 22px;gap:5px}.ex-row input{padding:5px 5px;font-size:11.5px}}
.goalhead{display:flex;align-items:center;gap:10px}
.sg-name{flex:1;font-family:'Cormorant Garamond',serif;font-size:19px;border:none;background:none;box-shadow:none;padding:2px 4px}
.sg-name:focus{outline:none;background:var(--gold-wash);border-radius:6px}
.sg-nums{display:flex;gap:16px;align-items:center;flex-wrap:wrap;margin-top:4px}
.sg-nums label,.ln-grid label{font-size:11px;color:var(--ink-mute);letter-spacing:.05em;text-transform:uppercase;font-family:'Cinzel',serif;display:flex;flex-direction:column;gap:4px}
.sg-nums label input,.ln-grid label input{width:110px;font-family:'Cormorant Garamond',serif;font-size:16px}
.sg-pct{font-size:12.5px;color:var(--gold);margin-left:auto}
.ln-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:8px}
.loan-remaining{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin:10px 0 2px}
.loan-remaining .lr-lab{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold)}
.loan-remaining .lr-val{font-family:'Cormorant Garamond',serif;font-size:30px;color:var(--espresso)}
.loan-remaining .lr-sub{font-size:12px;color:var(--ink-mute)}
.bday-head{display:flex;align-items:center;gap:12px}
.bday-head .bmeta{margin-top:2px}
.gift-wrap{display:flex;flex-wrap:wrap;gap:8px}
.gift{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;border:1px solid var(--line);background:var(--card-2);font-size:13px;cursor:pointer;color:var(--espresso-soft);transition:.16s}
.gift:hover{border-color:var(--gold)}
.gift.bought{background:var(--gold);color:#fff;border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-wash);font-weight:500}
.gift .gx{opacity:.5;font-weight:400;cursor:pointer;margin-left:2px}
.gift .gx:hover{opacity:1;color:var(--terra)}
.gift.bought .gx{color:rgba(255,255,255,.85)}
.cell-bday{font-size:10px;color:var(--terra);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.35}
.ch-count{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--gold);margin-top:8px}
.block-add{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:12px}
.block-add input[data-block-label]{flex:2;min-width:130px}
.block-add select{min-width:120px}
.block-add input[type=time]{width:120px}
.block-add .to,.block-row .to{color:var(--ink-mute);font-size:13px}
.block-list{display:flex;flex-direction:column;gap:8px;margin-bottom:4px}
.block-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;background:var(--card);border:1px solid var(--line-soft);border-radius:9px;padding:9px 10px}
.block-row .bl-label{flex:1;min-width:110px}
.block-row .bl-cat{min-width:118px;font-size:12px}
.block-row .bl-time{width:110px}
.block-row .bl-dur{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--gold);margin-left:auto;min-width:56px;text-align:right}

<script>
/* ================= STORAGE ================= */
const KEY='magali_planner_v1';
let memoryStore=null, usingMemory=false;
function loadDB(){
  try{const raw=localStorage.getItem(KEY);if(raw)return JSON.parse(raw);}
  catch(e){usingMemory=true;}
  return null;
}
function persist(){
  const data=JSON.stringify(DB);
  if(usingMemory){memoryStore=data;return;}
  try{localStorage.setItem(KEY,data);}
  catch(e){usingMemory=true;memoryStore=data;}
}
/* ================= HELPERS ================= */
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const MONTHS=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const DOW=['Mo','Di','Mi','Do','Fr','Sa','So'];
function pad(n){return String(n).padStart(2,'0');}
function keyOf(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function parseKey(k){const[y,m,d]=k.split('-').map(Number);return new Date(y,m-1,d);}
const TODAY=new Date();TODAY.setHours(0,0,0,0);
const TODAY_KEY=keyOf(TODAY);
function euro(n){
  n=Number(n)||0;
  try{return new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR',maximumFractionDigits:2}).format(n);}
  catch(e){return '€'+n.toFixed(2);}
}
function fmtLong(d){return DOW[(d.getDay()+6)%7]+', '+d.getDate()+' '+MONTHS[d.getMonth()]+' '+d.getFullYear();}
/* ---- moon phase ---- */
const SYNODIC=29.53058867;
const MOON_EPOCH=Date.UTC(2000,0,6,18,14,0);
const MOON_NAMES=['Neumond','zunehmende Sichel','erstes Viertel','zunehmender Mond','Vollmond','abnehmender Mond','letztes Viertel','abnehmende Sichel'];
function moonFrac(date){let e=(moonLon(date)-sunLon(date));e=((e%360)+360)%360;return e/360;}
function moonSVG(f,size){
  size=size||15;const r=size/2;
  const cosv=Math.cos(2*Math.PI*f);const rx=r*Math.abs(cosv);
  const waxing=f<=0.5;const outer=waxing?1:0;
  let inner;if(waxing)inner=cosv<0?1:0;else inner=cosv<0?0:1;
  const d='M'+r+',0 A'+r+','+r+' 0 0 '+outer+' '+r+','+size+' A'+rx+','+r+' 0 0 '+inner+' '+r+',0 Z';
  return '<svg class="moon" width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'"><circle cx="'+r+'" cy="'+r+'" r="'+(r-0.5)+'" fill="none" stroke="currentColor" stroke-opacity=".3" stroke-width="1"/><path d="'+d+'" fill="currentColor"/></svg>';
}
function moonChip(date,size){const f=moonFrac(date);const name=MOON_NAMES[Math.round(f*8)%8];return '<span class="moonchip" title="'+name+'">'+moonSVG(f,size||15)+'</span>';}

/* ================= ASTRONOMY ENGINE ================= */
const DEG=Math.PI/180, DEG2=180/Math.PI;
function julianDay(date){return date.getTime()/86400000+2440587.5;}
function jcenturies(jd){return (jd-2451545.0)/36525;}
const PLANETS={
 Mercury:{el:[0.38709927,0.20563593,7.00497902,252.25032350,77.45779628,48.33076593],rt:[0.00000037,0.00001906,-0.00594749,149472.67411175,0.16047689,-0.12534081]},
 Venus:{el:[0.72333566,0.00677672,3.39467605,181.97909950,131.60246718,76.67984255],rt:[0.00000390,-0.00004107,-0.00078890,58517.81538729,0.00268329,-0.27769418]},
 Earth:{el:[1.00000261,0.01671123,-0.00001531,100.46457166,102.93768193,0.0],rt:[0.00000562,-0.00004392,-0.01294668,35999.37244981,0.32327364,0.0]},
 Mars:{el:[1.52371034,0.09339410,1.84969142,-4.55343205,-23.94362959,49.55953891],rt:[0.00001847,0.00007882,-0.00813131,19140.30268499,0.44441088,-0.29257343]},
 Jupiter:{el:[5.20288700,0.04838624,1.30439695,34.39644051,14.72847983,100.47390909],rt:[-0.00011607,-0.00013253,-0.00183714,3034.74612775,0.21252668,0.20469106]},
 Saturn:{el:[9.53667594,0.05386179,2.48599187,49.95424423,92.59887831,113.66242448],rt:[-0.00125060,-0.00050991,0.00193609,1222.49362201,-0.41897216,-0.28867794]}
};
function helio(name,T){
 const p=PLANETS[name],a=p.el[0]+p.rt[0]*T,e=p.el[1]+p.rt[1]*T,I=(p.el[2]+p.rt[2]*T)*DEG,L=p.el[3]+p.rt[3]*T,wbar=p.el[4]+p.rt[4]*T,Om=(p.el[5]+p.rt[5]*T)*DEG;
 let M=((L-wbar)%360+540)%360-180;M*=DEG;
 const w=(wbar*DEG)-Om;
 let E=M+e*Math.sin(M);
 for(let i=0;i<10;i++){const dE=(E-e*Math.sin(E)-M)/(1-e*Math.cos(E));E-=dE;if(Math.abs(dE)<1e-9)break;}
 const xp=a*(Math.cos(E)-e),yp=a*Math.sqrt(1-e*e)*Math.sin(E);
 const cw=Math.cos(w),sw=Math.sin(w),cO=Math.cos(Om),sO=Math.sin(Om),cI=Math.cos(I),sI=Math.sin(I);
 return {x:(cw*cO-sw*sO*cI)*xp+(-sw*cO-cw*sO*cI)*yp, y:(cw*sO+sw*cO*cI)*xp+(-sw*sO+cw*cO*cI)*yp};
}
function geoLon(name,date){const T=jcenturies(julianDay(date));const pl=helio(name,T),ea=helio('Earth',T);return (Math.atan2(pl.y-ea.y,pl.x-ea.x)*DEG2%360+360)%360;}
function isRetro(name,date){let a=geoLon(name,new Date(date.getTime()-43200000)),b=geoLon(name,new Date(date.getTime()+43200000));let d=b-a;if(d>180)d-=360;if(d<-180)d+=360;return d<0;}
function sunLon(date){const n=julianDay(date)-2451545.0;let L=(280.460+0.9856474*n)%360,g=((357.528+0.9856003*n)%360)*DEG;let lam=L+1.915*Math.sin(g)+0.020*Math.sin(2*g);return (lam%360+360)%360;}
function moonLon(date){const n=julianDay(date)-2451545.0;const Lp=218.316+13.176396*n,Mp=(134.963+13.064993*n)*DEG,D=(297.850+12.190749*n)*DEG,M=(357.529+0.985600*n)*DEG,F=(93.272+13.229350*n)*DEG;let lon=Lp+6.289*Math.sin(Mp)-1.274*Math.sin(Mp-2*D)+0.658*Math.sin(2*D)-0.186*Math.sin(M)+0.214*Math.sin(2*Mp)-0.114*Math.sin(2*F);return (lon%360+360)%360;}
const SIGNS=[['Widder','♈'],['Stier','♉'],['Zwillinge','♊'],['Krebs','♋'],['Löwe','♌'],['Jungfrau','♍'],['Waage','♎'],['Skorpion','♏'],['Schütze','♐'],['Steinbock','♑'],['Wassermann','♒'],['Fische','♓']];
function signOf(lon){return SIGNS[Math.floor((((lon%360)+360)%360)/30)];}
const SIGN_MEANING={
 Widder:'Feuer und Aufbruch. Mutige Anfänge, Tatkraft, der Drang zu handeln.',
 Stier:'Erde und Beständigkeit. Genuss, die Sinne, Geduld, langsames Bauen.',
 Zwillinge:'Luft und Neugier. Reden, Lernen, Verbinden, viele Fäden zugleich.',
 Krebs:'Wasser und Zuhause. Fühlen, Nähren, Geborgenheit, die innere Welt pflegen.',
 Löwe:'Feuer und Herz. Wärme, Kreativität, gesehen werden, großzügiger Ausdruck.',
 Jungfrau:'Erde und Sorgfalt. Ordnen, Verfeinern, Dienen, die Schönheit im Detail.',
 Waage:'Luft und Balance. Beziehung, Harmonie, Fairness, Schönheit, Ausgleich.',
 Skorpion:'Wasser und Tiefe. Intensität, Wahrheit, Wandlung, das Verborgene.',
 Schütze:'Feuer und Horizont. Sinn, Reisen, Freiheit, das große Ganze.',
 Steinbock:'Erde und Struktur. Disziplin, Ziele, der lange Aufstieg, stille Ambition.',
 Wassermann:'Luft und Vision. Das Ungewöhnliche, das Kollektive, Freiheit, Zukunft.',
 Fische:'Wasser und Traum. Mitgefühl, Fantasie, Hingabe, der Raum dazwischen.'
};
const PLANET_GLYPH={Mercury:'☿',Venus:'♀',Mars:'♂',Jupiter:'♃',Saturn:'♄'};
const RETRO_MEANING={
 Mercury:'Kommunikation, Technik, Reisen und Pläne können sich verheddern. Eine Zeit zum Prüfen, Überarbeiten und Nachschauen, nicht zum Starten.',
 Venus:'Liebe, Geld, Werte und Schönheit kommen auf den Prüfstand. Alte Beziehungen und Fragen nach dem eigenen Wert tauchen wieder auf.',

};
const PHASE_MEANING={
 'Neumond':'Ein Neuanfang. Setz eine Absicht und pflanz sie ein.',

};
const RITUAL_THEME={
 'Neumond':'Für Absichten & Neuanfänge',

};
const RITUALS={
 'Neumond':[
  'Schreib drei Absichten auf und leg sie an einen Ort, wo du sie nächsten Monat wiederfindest.',
  'Zünde eine Kerze an, benenne, was du einlädst, und lass sie ein Stück herunterbrennen.',

 ],

 ],

 ],

 ]
};
function moonRitual(phase,y,m){const pool=RITUALS[phase];return {theme:RITUAL_THEME[phase],text:pool[(((y*12+m)%pool.length)+pool.length)%pool.length]};}
const RETRO_PLANETS=['Mercury','Venus','Mars','Jupiter','Saturn'];
function retroEndDate(name,from){let d=new Date(from);for(let i=0;i<200;i++){d.setDate(d.getDate()+1);if(!isRetro(name,d))return d;}return null;}
function astroEvents(y,m){
 const dim=daysInMonth(y,m),evs=[];
 const noon=(dd)=>new Date(y,m,dd,12,0,0);
 for(let d=1;d<=dim;d++){
   // sun ingress
   const s0=signOf(sunLon(noon(d-1)))[0], s1s=signOf(sunLon(noon(d)));
   if(s1s[0]!==s0)evs.push({day:d,kind:'sun',glyph:s1s[1],title:'Sonne wechselt in '+s1s[0],meaning:SIGN_MEANING[s1s[0]]});
   // moon phases via elongation crossing
   const e0=((moonLon(noon(d-1))-sunLon(noon(d-1)))%360+360)%360;
   const e1=((moonLon(noon(d))-sunLon(noon(d)))%360+360)%360;
   [[0,'Neumond'],[90,'Erstes Viertel'],[180,'Vollmond'],[270,'Letztes Viertel']].forEach(function(pr){
     let a=((e0-pr[0]+540)%360)-180, b=((e1-pr[0]+540)%360)-180;
     if(a<0&&b>=0){const ms=signOf(moonLon(noon(d)));evs.push({day:d,kind:'moon',frac:moonFrac(noon(d)),title:pr[1]+' in '+ms[0],meaning:PHASE_MEANING[pr[1]],ritual:moonRitual(pr[1],y,m)});}
   });
   // retrograde stations
   RETRO_PLANETS.forEach(function(pn){
     const r0=isRetro(pn,noon(d-1)), r1=isRetro(pn,noon(d));
     if(!r0&&r1)evs.push({day:d,kind:'retro',glyph:PLANET_GLYPH[pn],title:pn+' wird rückläufig',meaning:RETRO_MEANING[pn]});
     if(r0&&!r1)evs.push({day:d,kind:'direct',glyph:PLANET_GLYPH[pn],title:pn+' wird direktläufig',meaning:pn+' nimmt den Faden wieder auf. Was stockte, kann sich wieder bewegen.'});
   });
 }
 evs.sort((a,b)=>a.day-b.day);
 return evs;
}
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function monthKey(y,m){return y+'-'+pad(m+1);}

function tasksOn(k){return DB.tasks.filter(t=>t.date===k);}
function cycleStatus(s){return s==='todo'?'doing':s==='doing'?'done':'todo';}
function isOverdue(t){return t.due&&t.due<TODAY_KEY&&t.status!=='done';}
function catOf(id){return DB.categories.find(c=>c.id===id)||null;}

function taskHTML(t){
  const cat=catOf(t.cat);
  const cls='task '+(t.status==='done'?'done':'');
  const accent=cat?' style="border-left:4px solid '+cat.color+'"':'';
  let due='';
  if(t.due){
    const ov=isOverdue(t);
    const d=parseKey(t.due);
    due='<span class="chip due '+(ov?'overdue':'')+'" data-editdue="'+t.id+'">'+(ov?'überfällig · ':'fällig ')+d.getDate()+' '+MONTHS[d.getMonth()].slice(0,3)+'</span>';
  }else{
    due='<span class="chip due" data-editdue="'+t.id+'" style="opacity:.6">+ Fälligkeit</span>';
  }
  let pri='';
  if(t.priority&&t.priority!=='none'){pri='<span class="chip p-'+t.priority+'" data-pri="'+t.id+'">'+t.priority+'</span>';}
  else{pri='<span class="chip" data-pri="'+t.id+'" style="opacity:.55">+ Priorität</span>';}
  let rep='';
  if(t.recOf){rep='<span class="chip" style="opacity:.5" title="Part of a repeating task">↻</span>';}
  else if(t.repeat&&t.repeat!=='none'){rep='<span class="chip rep-on" data-repeat="'+t.id+'">↻ '+t.repeat+'</span>';}
  else{rep='<span class="chip" data-repeat="'+t.id+'" style="opacity:.55">+ wiederholen</span>';}
  let proj='';
  const p=DB.projects.find(p=>p.id===t.project);
  if(p)proj='<span class="chip" style="color:var(--gold)">✦ '+esc(p.name)+'</span>';
  const catChip='<select class="catchip" data-taskcat="'+t.id+'"'+(cat?' style="border-color:'+cat.color+';color:'+cat.color+'"':'')+'>'+
    '<option value=""'+(cat?'':' selected')+'>· Kategorie</option>'+
    DB.categories.map(c=>'<option value="'+c.id+'"'+(t.cat===c.id?' selected':'')+'>'+c.icon+' '+esc(c.label)+'</option>').join('')+
  '</select>';
  const iconPre=cat?'<span class="t-icon">'+cat.icon+'</span>':'';
  return '<div class="'+cls+'" data-task="'+t.id+'"'+accent+'>'+
    '<div class="dot '+t.status+'" data-cycle="'+t.id+'" title="Tap to move through: to begin, in progress, done"></div>'+
    '<div class="t-body">'+
      '<div class="t-titlerow">'+iconPre+'<div class="t-title" contenteditable data-title="'+t.id+'">'+esc(t.title)+'</div></div>'+
      '<div class="t-meta">'+catChip+due+pri+rep+proj+'</div>'+
    '</div>'+
    '<button class="t-del" data-del="'+t.id+'" title="Löschen">×</button>'+
  '</div>';
}
function taskListHTML(list,emptyMsg){
  if(!list.length)return '<div class="empty"><div class="e-star">✦</div><p>'+emptyMsg+'</p></div>';
  return list.map(taskHTML).join('');
}

function agendaHTML(hours,tb,nowHr){
  if(!hours.length)return '<div class="empty" style="padding:22px"><div class="e-star">✦</div><p>Noch keine festen Zeiten. Füg sie in der Tagesansicht hinzu.</p></div>';
  return '<div class="agenda">'+hours.map(h=>'<div class="ag-row '+(h===nowHr?'now':'')+'"><span class="ag-time">'+pad(h)+':00</span><span class="ag-text">'+esc(tb[h])+'</span></div>').join('')+'</div>';
}
function ritualStreak(id){
  let s=0,d=new Date(TODAY);
  const done=k=>DB.ritualLog[k]&&DB.ritualLog[k][id];
  if(!done(keyOf(d)))d.setDate(d.getDate()-1);
  while(done(keyOf(d))){s++;d.setDate(d.getDate()-1);}
  return s;
}
function ritualsHTML(rituals,rlog){
  if(!rituals.length)return '<div class="empty" style="padding:18px"><div class="e-star">✦</div><p>Füg ein kleines tägliches Ritual hinzu.</p></div>';
  return rituals.map(r=>{
    const done=!!rlog[r.id];const streak=ritualStreak(r.id);
    return '<div class="ritual '+(done?'done':'')+'">'+
      '<div class="rcheck '+(done?'on':'')+'" data-ritualtoggle="'+r.id+'" title="Heute als erledigt markieren">✓</div>'+
      '<button class="ricon-btn" data-iconpick="ritual:'+r.id+'" title="Symbol ändern">'+(r.icon||'✨')+'</button>'+
      '<span class="rname">'+esc(r.name)+'</span>'+
      (streak>1?'<span class="rstreak">'+streak+' days</span>':'')+
      '<button class="t-del" data-ritualdel="'+r.id+'">×</button>'+
    '</div>';
  }).join('');
}

function nextBdayInfo(b){
  const now=TODAY;let y=now.getFullYear();
  const mk=(yy)=>new Date(yy,b.month-1,Math.min(b.day,daysInMonth(yy,b.month-1)));
  let next=mk(y);
  if(next<now)next=mk(++y);
  const days=Math.round((next-now)/86400000);
  let age=null;
  if(b.year&&+b.year<y)age=y-(+b.year);
  return {next,days,age};
}
function bdayDateVal(b){const y=b.year||TODAY.getFullYear();return y+'-'+pad(b.month)+'-'+pad(b.day);}

/* ================= DAY ================= */
function blockMinutes(b){
  if(!b.start||!b.end)return 0;
  const s=b.start.split(':').map(Number),e=b.end.split(':').map(Number);
  let m=(e[0]*60+e[1])-(s[0]*60+s[1]);
  return m>0?m:0;
}
function fmtDur(min){const h=Math.floor(min/60),m=Math.round(min%60);return ((h?h+'h':'')+(m?(h?' ':'')+m+'m':''))||'0m';}
function dayTimeStats(k){
  const blocks=DB.blocks[k]||[];
  const counts={};
  if(blocks.length){
    blocks.forEach(b=>{const m=blockMinutes(b);if(m>0){const c=b.cat||'__';counts[c]=(counts[c]||0)+m;}});
    return counts;
  }
  const tb=DB.timeblocks[k]||{},hc=DB.hourCat[k]||{};
  Object.keys(tb).forEach(h=>{if(tb[h]&&String(tb[h]).trim()){const c=hc[h]||'__';counts[c]=(counts[c]||0)+60;}});
  return counts;
}
function hoursDonut(slices,total){
  if(!total)return '';
  const r=70,c=2*Math.PI*r;let off=0,segs='';
  slices.forEach(s=>{const len=(s.amount/total)*c;segs+='<circle cx="90" cy="90" r="70" fill="none" stroke="'+s.color+'" stroke-width="24" stroke-dasharray="'+len+' '+(c-len)+'" stroke-dashoffset="'+(-off)+'" transform="rotate(-90 90 90)"/>';off+=len;});
  const hrs=total/60,ctr=(Number.isInteger(hrs)?hrs:hrs.toFixed(1))+'h';
  return '<svg width="176" height="176" viewBox="0 0 180 180">'+segs+'<text x="90" y="86" text-anchor="middle" font-family="Cinzel,serif" font-size="9" letter-spacing="1.5" fill="var(--ink-mute)">GESAMT</text><text x="90" y="110" text-anchor="middle" font-family="Cormorant Garamond,serif" font-size="26" fill="var(--espresso)">'+ctr+'</text></svg>';
}
function dayDiagramHTML(k){
  const counts=dayTimeStats(k);const cats=Object.keys(counts);
  if(!cats.length)return '<div class="empty" style="padding:20px"><div class="e-star">✦</div><p>Buch Zeitblöcke oder markiere deine Stunden, um zu sehen, wohin die Zeit geht.</p></div>';
  const total=cats.reduce((s,c)=>s+counts[c],0);
  const slices=cats.map(c=>{
    if(c==='__')return {label:'Ohne',amount:counts[c],color:'#C9B79A'};
    const cat=catOf(c);return {label:cat?cat.label:'Andere',amount:counts[c],color:cat?cat.color:'#C9B79A'};
  }).sort((a,b)=>b.amount-a.amount);
  return '<div style="display:grid;grid-template-columns:180px 1fr;gap:26px;align-items:center">'+
    '<div style="justify-self:center">'+hoursDonut(slices,total)+'</div>'+
    '<div class="legend">'+slices.map(s=>'<div class="li"><span class="sw" style="background:'+s.color+'"></span>'+esc(s.label)+'<span class="amt">'+fmtDur(s.amount)+'</span></div>').join('')+'</div>'+
  '</div>';
}
function weekTimeStats(ws){
  const total={};
  for(let i=0;i<7;i++){
    const d=new Date(ws.getFullYear(),ws.getMonth(),ws.getDate()+i);
    const day=dayTimeStats(keyOf(d));
    for(const c in day){total[c]=(total[c]||0)+day[c];}
  }
  return total;
}
function weekDiagramHTML(ws){

  }).sort((a,b)=>b.amount-a.amount);
  return '<div style="display:grid;grid-template-columns:180px 1fr;gap:26px;align-items:center">'+
    '<div style="justify-self:center">'+hoursDonut(slices,total)+'</div>'+
    '<div class="legend">'+slices.map(s=>'<div class="li"><span class="sw" style="background:'+s.color+'"></span>'+esc(s.label)+'<span class="amt">'+fmtDur(s.amount)+'</span></div>').join('')+'</div>'+

function renderMonth(){
  const y=S.year,m=S.month;
  const first=new Date(y,m,1);

  const daysIn=new Date(y,m+1,0).getDate();
  const intent=DB.intentions.month[monthKey(y,m)]||'';
  let cells='';
  for(let i=0;i<startOff;i++){const dd=new Date(y,m,1-(startOff-i));cells+=cell(dd,true);}
  for(let d=1;d<=daysIn;d++){cells+=cell(new Date(y,m,d),false);}
  const total=startOff+daysIn;const trail=(7-(total%7))%7;

function moneyRow(x,type,i){
  return '<div class="moneyrow">'+
    '<input value="'+esc(x.label||'')+'" data-mlabel="'+type+':'+i+'" placeholder="Bezeichnung">'+
    '<div></div>'+
    '<input class="amt" type="number" step="0.01" value="'+(x.amount||'')+'" data-mamt="'+type+':'+i+'" placeholder="0">'+
    '<button class="t-del" data-mdel="'+type+':'+i+'" style="opacity:.5">×</button>'+
  '</div>';
}
function buildDonut(slices,total){
  if(!total)return '';
  const r=70,c=2*Math.PI*r,cx=90,cy=90;let off=0;
  let segs='';
  slices.forEach((x,i)=>{
    const frac=(+x.amount||0)/total;const len=frac*c;
    segs+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+CAT_COLORS[i%CAT_COLORS.length]+'" stroke-width="26" stroke-dasharray="'+len+' '+(c-len)+'" stroke-dashoffset="'+(-off)+'" transform="rotate(-90 '+cx+' '+cy+')"/>';
    off+=len;
  });
  return '<svg width="180" height="180" viewBox="0 0 180 180">'+segs+
    '<text x="90" y="84" text-anchor="middle" font-family="Cinzel,serif" font-size="9" letter-spacing="1.5" fill="var(--ink-mute)">GESAMT</text>'+
    '<text x="90" y="104" text-anchor="middle" font-family="Cormorant Garamond,serif" font-size="22" fill="var(--espresso)">'+euro(total).replace(/\s/g,'')+'</text>'+
  '</svg>';
}

function donutColored(slices,centerLabel){
  const total=slices.reduce((s,x)=>s+(+x.amount||0),0);

function monthsBetween(a,b){let m=(b.getFullYear()-a.getFullYear())*12+(b.getMonth()-a.getMonth());if(b.getDate()<a.getDate())m--;return m;}
function loanInfo(l){
  const total=+l.total||0;
  const per=(+l.monthly||0)+(+l.extra||0);
  let elapsed=0;
  if(l.start){elapsed=Math.max(0,monthsBetween(parseKey(l.start),TODAY));}
  const paid=Math.min(total,per*elapsed);
  const remaining=Math.max(0,total-paid);
  const monthsLeft=(per>0&&remaining>0)?Math.ceil(remaining/per):(remaining===0?0:null);
  let payoff=null;
  if(monthsLeft!=null&&remaining>0){payoff=new Date(TODAY);payoff.setMonth(payoff.getMonth()+monthsLeft);}
  return {total,per,elapsed,paid,remaining,monthsLeft,payoff};
}

const SEASONS={
  winter:{name:'Innerer Winter',phase:'Menstruation',color:'#8B7355',note:'Ruhe ist jetzt die Arbeit. Weniger Energie ist Information, kein Versagen. Halt den Kalender ruhiger, wo du kannst.'},
  spring:{name:'Innerer Frühling',phase:'Follikelphase',color:'#7E9070',note:'Die Energie kommt zurück. Gute Tage zum Starten, Planen und Ja-Sagen zum Neuen.'},
  summer:{name:'Innerer Sommer',phase:'Eisprung',color:'#B08D4F',note:'Höhepunkt. Am offensten und ausdrucksstärksten. Leg die sichtbare Arbeit und schwierigere Gespräche hierher.'},
  autumn:{name:'Innerer Herbst',phase:'Lutealphase',color:'#A85C40',note:'Es klingt aus. Überarbeiten, Abschließen und Aufräumen passen jetzt besser als Anfangen. Schütze deine Energie.'}

function lastPeriodStart(){
  const p=[...DB.cycle.periods].sort();
  return p.length?p[p.length-1]:null;
}
function computeAvgCycle(){
  const p=[...DB.cycle.periods].sort();
  if(p.length<2)return DB.cycle.avgCycle||28;
  let sum=0,n=0;
  for(let i=1;i<p.length;i++){
    const diff=Math.round((parseKey(p[i])-parseKey(p[i-1]))/86400000);
    if(diff>15&&diff<45){sum+=diff;n++;}
  }
  return n?Math.round(sum/n):(DB.cycle.avgCycle||28);
}
function cycleInfo(){
  const last=lastPeriodStart();
  const avg=computeAvgCycle();
  const period=DB.cycle.avgPeriod||5;
  if(!last)return{day:null,avg,period};
  const day=Math.round((TODAY-parseKey(last))/86400000)+1;
  const ovul=avg-14;
  let season;
  if(day<=period)season='winter';
  else if(day<ovul-1)season='spring';
  else if(day<=ovul+1)season='summer';
  else season='autumn';
  const nextStart=new Date(parseKey(last));nextStart.setDate(nextStart.getDate()+avg);
  const daysToNext=Math.round((nextStart-TODAY)/86400000);
  const fertStart=new Date(parseKey(last));fertStart.setDate(fertStart.getDate()+ovul-5);
  const fertEnd=new Date(parseKey(last));fertEnd.setDate(fertEnd.getDate()+ovul+1);
  return{day,avg,period,season,nextStart,daysToNext,fertStart,fertEnd,last};
}

  const info=cycleInfo();

  const log=DB.cycle.logs[k]||{flow:'',energy:0,mood:'',symptoms:[],note:''};
  const periods=[...DB.cycle.periods].sort().reverse();
  let ringHTML='',headMain='',headSub='',seasonNote='';
  if(info.day===null){

  }else{
    const s=SEASONS[info.season];

    headSub=s.name+' · '+s.phase;

function getApiKey(){try{return localStorage.getItem('anima_api_key')||'';}catch(e){return '';}}
function createBoard(title){
  const id=uid();
  const b={id,title:title||'Neue Idee',nodes:[{id:uid(),text:'Zentrale Idee',x:600,y:380,parent:null}],plan:null};
  DB.boards.push(b);S.board=id;S.selNode=null;persist();return b;
}
function getBoard(){
  if(!DB.boards.length){createBoard('Erster Funke');}
  let b=DB.boards.find(x=>x.id===S.board);
  if(!b){b=DB.boards[0];S.board=b.id;}
  return b;
}
function childrenOf(board,id){return board.nodes.filter(n=>n.parent===id);}
function descendants(board,id){let out=[];childrenOf(board,id).forEach(c=>{out.push(c.id);out=out.concat(descendants(board,c.id));});return out;}
function addChild(parentId){
  const board=getBoard();
  const parent=board.nodes.find(n=>n.id===parentId)||board.nodes.find(n=>!n.parent);
  const kids=childrenOf(board,parent.id).length;
  const nx=Math.max(10,(parent.x||400)+200);
  const ny=Math.max(10,(parent.y||380)+(kids*86)-60+(Math.random()*20-10));
  const id=uid();
  board.nodes.push({id,text:'Neue Idee',x:nx,y:ny,parent:parent.id});
  S.selNode=id;persist();render();
}
function addNodeAt(x,y){
  const board=getBoard();
  const parent=(S.selNode&&board.nodes.find(n=>n.id===S.selNode))||board.nodes.find(n=>!n.parent);
  const id=uid();
  board.nodes.push({id,text:'Neue Idee',x:Math.max(10,Math.min(1320,x)),y:Math.max(10,Math.min(850,y)),parent:parent?parent.id:null});
  persist();editNode(id);
}
function deleteNode(id){
  const board=getBoard();const n=board.nodes.find(x=>x.id===id);if(!n||!n.parent)return;
  const kill=[id,...descendants(board,id)];
  board.nodes=board.nodes.filter(x=>!kill.includes(x.id));
  if(kill.includes(S.selNode))S.selNode=null;
  persist();render();
}
function editNode(id){
  S.selNode=id;render();
  requestAnimationFrame(()=>{
    const el=document.querySelector('[data-nodetext="'+id+'"]');
    if(!el)return;el.contentEditable='true';el.focus();
    const r=document.createRange();r.selectNodeContents(el);const sel=window.getSelection();sel.removeAllRanges();sel.addRange(r);
  });
}
function buildOutline(board){
  const seed=board.nodes.find(n=>!n.parent)||board.nodes[0];
  let out='CENTRAL IDEA: '+seed.text+'\n';
  (function walk(pid,depth){childrenOf(board,pid).forEach(c=>{out+='  '.repeat(depth)+'- '+c.text+'\n';walk(c.id,depth+1);});})(seed.id,1);
  return out;
}
function localPlan(board){
  const seed=board.nodes.find(n=>!n.parent)||board.nodes[0];
  const tops=childrenOf(board,seed.id);
  const phases=[{title:'Get clear',steps:[{text:'Define what "'+seed.text+'" really means, and what finished looks like',done:false},{text:'Name the one outcome that matters most',done:false}]}];
  tops.forEach(t=>{
    const kids=childrenOf(board,t.id);
    const steps=[{text:'Work out: '+t.text,done:false}].concat(kids.map(k=>({text:k.text,done:false})));
    phases.push({title:t.text,steps});
  });
  phases.push({title:'Ship it',steps:[{text:'Pick where this lives and set a real date',done:false},{text:'Do the smallest honest version first',done:false}]});
  return phases;
}
async function callClaude(outline){
  const key=getApiKey();
  const sys="You convert a brainstorm mind map into a grounded, concrete action plan. Voice: warm, direct, plain. Short imperative steps. No hype, no filler, none of the words level up, unlock, unleash, crush, or CEO energy. Antworte auf Deutsch. Gib NUR gültiges JSON zurück, ohne Markdown-Zäune, ohne Vorwort.";
  const user=outline+"\n\nTurn this into a sequenced plan. Return JSON exactly as: {\"phases\":[{\"title\":\"short phase title\",\"steps\":[\"a concrete step\"]}]}. Use 3 to 5 phases, 2 to 5 steps each. Die Schritte sind kurz und machbar, auf Deutsch.";
  const headers={"Content-Type":"application/json"};
  if(key){headers["x-api-key"]=key;headers["anthropic-version"]="2023-06-01";headers["anthropic-dangerous-direct-browser-access"]="true";}
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers,body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system:sys,messages:[{role:"user",content:user}]})});
  if(!res.ok)throw new Error('api '+res.status);
  const data=await res.json();
  const text=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join("\n");
  const parsed=JSON.parse(text.replace(/```json|```/g,'').trim());
  return parsed.phases;
}
async function generatePlan(){
  const board=getBoard();
  board._loading=true;render();
  let phases=null,source='local';
  try{
    const p=await callClaude(buildOutline(board));
    if(p&&p.length){source='ai';phases=p.map(x=>({title:String(x.title||'Step'),steps:(x.steps||[]).map(s=>({text:String(typeof s==='string'?s:(s.text||s)),done:false}))}));}
    else throw new Error('empty');
  }catch(e){phases=localPlan(board);source='local';}
  board.plan={phases,source};board._loading=false;persist();render();
}

function drawConnectors(){
  const canvas=document.querySelector('.bcanvas');const svg=document.querySelector('.bconnectors');
  if(!canvas||!svg)return;
  const board=getBoard();let paths='';
  board.nodes.forEach(n=>{
    if(!n.parent)return;
    const el=canvas.querySelector('[data-node="'+n.id+'"]');
    const pe=canvas.querySelector('[data-node="'+n.parent+'"]');
    if(!el||!pe)return;
    const x1=pe.offsetLeft+pe.offsetWidth/2,y1=pe.offsetTop+pe.offsetHeight/2;
    const x2=el.offsetLeft+el.offsetWidth/2,y2=el.offsetTop+el.offsetHeight/2;
    const my=(y1+y2)/2;
    paths+='<path d="M'+x1+' '+y1+' C '+x1+' '+my+' '+x2+' '+my+' '+x2+' '+y2+'" fill="none" stroke="#B06FB8" stroke-width="1.6" opacity="0.45"/>';
  });
  svg.innerHTML=paths;
}
const clampz=v=>Math.max(0.3,Math.min(1.7,v));
function applyZoom(){
  const cv=document.querySelector('.bcanvas'),sc=document.querySelector('.bcanvas-scale');
  if(cv){cv.style.transform='scale('+S.zoom+')';cv.style.transformOrigin='0 0';}
  if(sc){sc.style.width=(1400*S.zoom)+'px';sc.style.height=(900*S.zoom)+'px';}
  const l=document.getElementById('zoomlbl');if(l)l.textContent=Math.round(S.zoom*100)+'%';
}
function zoomAt(cx,cy,nz){
  const wrap=document.querySelector('.canvaswrap');
  if(!wrap){S.zoom=clampz(nz);applyZoom();return;}
  const rect=wrap.getBoundingClientRect();
  const canX=(wrap.scrollLeft+(cx-rect.left))/S.zoom, canY=(wrap.scrollTop+(cy-rect.top))/S.zoom;
  S.zoom=clampz(nz);applyZoom();
  wrap.scrollLeft=canX*S.zoom-(cx-rect.left);
  wrap.scrollTop=canY*S.zoom-(cy-rect.top);
}
function zoomStep(dir){
  const wrap=document.querySelector('.canvaswrap');
  if(!wrap){S.zoom=clampz(S.zoom+dir*0.15);applyZoom();return;}
  const r=wrap.getBoundingClientRect();
  zoomAt(r.left+r.width/2,r.top+r.height/2,S.zoom+dir*0.15);
}
function zoomFit(){
  const wrap=document.querySelector('.canvaswrap');const board=getBoard();
  if(!wrap||!board.nodes.length)return;
  let minX=Infinity,minY=Infinity,maxX=0,maxY=0;
  board.nodes.forEach(n=>{
    const el=document.querySelector('[data-node="'+n.id+'"]');
    const w=el?el.offsetWidth:130,h=el?el.offsetHeight:56;
    minX=Math.min(minX,n.x||0);minY=Math.min(minY,n.y||0);
    maxX=Math.max(maxX,(n.x||0)+w);maxY=Math.max(maxY,(n.y||0)+h);
  });
  const pad=50,cw=(maxX-minX)+pad*2,ch=(maxY-minY)+pad*2;
  S.zoom=Math.max(0.3,Math.min(1.4,Math.min(wrap.clientWidth/cw,wrap.clientHeight/ch)));
  applyZoom();
  requestAnimationFrame(()=>{wrap.scrollLeft=Math.max(0,(minX-pad)*S.zoom);wrap.scrollTop=Math.max(0,(minY-pad)*S.zoom);});
}

function addRitual(){
  const input=document.querySelector('[data-addritual]');if(!input)return;
  const v=input.value.trim();if(!v)return;
  DB.rituals.push({id:uid(),name:v,icon:'✨'});
  input.value='';persist();render();
}
function addCategory(){
  const input=document.querySelector('[data-addcat]');if(!input)return;
  const v=input.value.trim();if(!v)return;
  const used=DB.categories.length;
  DB.categories.push({id:uid(),label:v,color:CAT_PALETTE[used%CAT_PALETTE.length],icon:'✨'});
  input.value='';persist();render();
}
const CAT_PALETTE=['#E88BB0','#7FB07F','#A98BD1','#E8B58B','#8BA5D1','#D98B8B','#8FC7C0','#C7B37F'];
function cycleCatIcon(id){
  const c=catOf(id);if(!c)return;
  const i=ICON_SET.indexOf(c.icon);
  c.icon=ICON_SET[(i+1)%ICON_SET.length];
  persist();render();
}
function cycleIcon(item){
  if(!item)return;
  const i=ICON_SET.indexOf(item.icon);
  item.icon=ICON_SET[(i+1)%ICON_SET.length];
  persist();render();
}
let iconTarget=null;
function openIconPicker(ref){
  iconTarget=ref;
  const grid=document.getElementById('icongrid');
  if(grid)grid.innerHTML=ICON_SET.map(e=>'<button data-iconchoose="'+e+'">'+e+'</button>').join('');
  document.getElementById('iconmodal').classList.add('on');
}
function setIcon(ref,emoji){
  const idx=ref.indexOf(':');const type=ref.slice(0,idx);const id=ref.slice(idx+1);
  let item=null;
  if(type==='cat')item=DB.categories.find(c=>c.id===id);
  else if(type==='exp'){const f=findExp(id);item=f&&f.item;}
  else if(type==='sg')item=DB.money.goals.find(x=>x.id===id);
  else if(type==='ln')item=DB.money.loans.find(x=>x.id===id);
  else if(type==='inv')item=DB.money.investments.find(x=>x.id===id);
  else if(type==='ritual')item=DB.rituals.find(x=>x.id===id);
  else if(type==='bucket')item=DB.bucket.find(x=>x.id===id);
  else if(type==='challenge')item=DB.challenges.find(x=>x.id===id);
  if(item){item.icon=emoji;persist();}
}
function addExp(kind){
  const input=document.querySelector('[data-addexp="'+kind+'"]');if(!input)return;
  const v=input.value.trim();if(!v)return;
  const arr=kind==='fixed'?DB.money.fixed:kind==='income'?DB.money.incomes:DB.money.variable;
  arr.push({id:uid(),label:v,amount:0,color:CAT_PALETTE[arr.length%CAT_PALETTE.length],icon:kind==='income'?'💶':'✨'});
  input.value='';persist();render();
}

  const input=document.querySelector('[data-addsg]');if(!input)return;

  DB.money.goals.push({id:uid(),name:v,target:0,saved:0,icon:'🎯',color:'#B08D4F'});
  input.value='';persist();render();
}
function addLoan(){

}
function addInvestment(){
  const input=document.querySelector('[data-addinv]');if(!input)return;

function editDue(id){ openDatePicker(id); }
let dateTarget=null,dateYM=null;
function paintDateModal(){
  const body=document.getElementById('datebody');if(!body||!dateYM)return;
  const y=dateYM.y,m=dateYM.m;
  const task=DB.tasks.find(x=>x.id===dateTarget);
  const sel=task&&task.due?task.due:null;
  const start=(new Date(y,m,1).getDay()+6)%7;
  const days=new Date(y,m+1,0).getDate();
  const todayKey=keyOf(new Date());
  let cells='';
  for(let i=0;i<start;i++)cells+='<span class="dp-cell dp-empty"></span>';
  for(let d=1;d<=days;d++){
    const key=y+'-'+pad(m+1)+'-'+pad(d);
    cells+='<button class="dp-cell'+(key===sel?' sel':'')+(key===todayKey?' today':'')+'" data-datechoose="'+key+'">'+d+'</button>';
  }
  body.innerHTML=
    '<div class="dp-head"><button class="dp-nav" data-datemonth="-1">‹</button>'+
      '<div class="dp-title">'+MONTHS[m]+' '+y+'</div>'+
      '<button class="dp-nav" data-datemonth="1">›</button></div>'+
    '<div class="dp-dow">'+DOW.map(d=>'<span>'+d+'</span>').join('')+'</div>'+
    '<div class="dp-grid">'+cells+'</div>'+
    '<div class="dp-foot"><button class="btn ghost small" data-dateclear>Löschen</button><button class="btn ghost small" data-dateclose>Schließen</button></div>';
}
function openDatePicker(id){
  const task=DB.tasks.find(x=>x.id===id);if(!task)return;
  dateTarget=id;
  const base=task.due?new Date(task.due+'T00:00'):new Date();
  dateYM={y:base.getFullYear(),m:base.getMonth()};
  paintDateModal();
  document.getElementById('datemodal').classList.add('on');
}
function closeDatePicker(){dateTarget=null;const dm=document.getElementById('datemodal');if(dm)dm.classList.remove('on');}
function cyclePriority(id){
  const task=DB.tasks.find(x=>x.id===id);if(!task)return;
  const order=['none','low','med','high'];
  task.priority=order[(order.indexOf(task.priority)+1)%order.length];
  persist();render();
}
function addProject(){

  const v=input.value.trim();if(!v)return;

  input.value='';persist();render();

function daysInMonth(y,m){return new Date(y,m+1,0).getDate();}
function clearRecInstances(tid){DB.tasks=DB.tasks.filter(t=>!(t.recOf===tid&&t.date>=TODAY_KEY&&t.status!=='done'));}
function syncRecurringTasks(){
  const templates=DB.tasks.filter(t=>t.repeat&&t.repeat!=='none'&&!t.recOf);
  if(!templates.length)return;
  const end=new Date(TODAY);end.setDate(end.getDate()+42);
  templates.forEach(function(tpl){
    const base=parseKey(tpl.date||TODAY_KEY);
    for(let d=new Date(TODAY);d<=end;d.setDate(d.getDate()+1)){
      const k=keyOf(d);
      if(k===tpl.date)continue;
      let match=false;
      if(tpl.repeat==='daily')match=true;
      else if(tpl.repeat==='weekly')match=(d.getDay()===base.getDay());
      else if(tpl.repeat==='monthly')match=(d.getDate()===Math.min(base.getDate(),daysInMonth(d.getFullYear(),d.getMonth())));
      if(!match)continue;
      if(DB.tasks.some(x=>x.recOf===tpl.id&&x.date===k))continue;
      DB.tasks.push({id:uid(),title:tpl.title,date:k,status:'todo',priority:tpl.priority||'none',project:tpl.project||null,due:null,notes:'',cat:tpl.cat||null,recOf:tpl.id});
    }
  });
}
function clearBillTasks(billId){DB.tasks=DB.tasks.filter(t=>!(t.bill===billId&&t.date>=TODAY_KEY&&t.status!=='done'));}
function syncBillTasks(){
  if(!DB.bills||!DB.bills.length)return;
  const base=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);
  for(let off=0;off<=2;off++){
    const d=new Date(base.getFullYear(),base.getMonth()+off,1);
    const y=d.getFullYear(),mo=d.getMonth(),mk=monthKey(y,mo);
    DB.bills.forEach(b=>{
      if(!b.dueDay)return;
      const day=Math.min(+b.dueDay,daysInMonth(y,mo));
      const dk=keyOf(new Date(y,mo,day));
      const exists=DB.tasks.some(t=>t.bill===b.id&&t.billMonth===mk);
      if(!exists){
        DB.tasks.push({id:uid(),title:'Zahlen: '+b.name+(b.amount?' · '+euro(b.amount):''),date:dk,status:'todo',priority:'none',project:null,due:dk,notes:'',cat:null,bill:b.id,billMonth:mk});
      }
    });
  }
}
function addBill(){
  const name=document.querySelector('[data-bill-name]');
  const amt=document.querySelector('[data-bill-amt]');
  const date=document.querySelector('[data-bill-date]');
  if(!name)return;const v=name.value.trim();if(!v)return;
  const dueDay=date&&date.value?parseKey(date.value).getDate():1;
  DB.bills.push({id:uid(),name:v,amount:+amt.value||0,dueDay,paid:false,recurring:true});
  if(name)name.value='';if(amt)amt.value='';
  syncBillTasks();persist();render();
}
function addMoney(type){
  const input=document.querySelector('[data-addmoney="'+type+'"]');if(!input)return;
  const v=input.value.trim();if(!v)return;
  const b=DB.budget[S.budgetMonth]||(DB.budget[S.budgetMonth]={income:[],expenses:[]});
  (type==='inc'?b.income:b.expenses).push({label:v,amount:0});
  input.value='';persist();render();
}
function bmonth(v){
  let [y,m]=S.budgetMonth.split('-').map(Number);m--;
  if(v==='today'){y=TODAY.getFullYear();m=TODAY.getMonth();}
  else{m+=+v;if(m<0){m=11;y--;}if(m>11){m=0;y++;}}
  S.budgetMonth=monthKey(y,m);render();
}
function addGoal(y){

  DB.yearGoals[y]=DB.yearGoals[y]||[];

/* ================= MIND-MAP POINTER HANDLING ================= */
let bdrag=null;
document.addEventListener('pointerdown',e=>{
  if(S.view!=='brainstorm')return;
  const node=e.target.closest('.bnode');
  if(!node||e.target.closest('.bnode-ctrl')||e.target.isContentEditable)return;
  const board=getBoard();const n=board.nodes.find(x=>x.id===node.dataset.node);if(!n)return;
  bdrag={id:n.id,el:node,n,sx:e.clientX,sy:e.clientY,ox:n.x||0,oy:n.y||0,moved:false};
  try{node.setPointerCapture(e.pointerId);}catch(err){}
});
document.addEventListener('pointermove',e=>{
  if(!bdrag)return;
  const dx=e.clientX-bdrag.sx,dy=e.clientY-bdrag.sy;
  if(Math.abs(dx)+Math.abs(dy)>3)bdrag.moved=true;
  bdrag.n.x=Math.max(0,bdrag.ox+dx/S.zoom);bdrag.n.y=Math.max(0,bdrag.oy+dy/S.zoom);
  bdrag.el.style.left=bdrag.n.x+'px';bdrag.el.style.top=bdrag.n.y+'px';
  drawConnectors();
});
document.addEventListener('pointerup',()=>{
  if(!bdrag)return;const d=bdrag;bdrag=null;
  if(d.moved){persist();}
  else{editNode(d.id);}
});
document.addEventListener('click',e=>{
  if(S.view!=='brainstorm')return;
  if(e.target.closest('.bnode'))return;
  if(e.target.closest('.canvaswrap')&&S.selNode){S.selNode=null;render();}
});
document.addEventListener('dblclick',e=>{
  if(S.view!=='brainstorm')return;
  const txt=e.target.closest('.bnode-text');
  if(txt){editNode(txt.dataset.nodetext);return;}
  if(e.target.closest('.bnode'))return;
  if(!e.target.closest('.canvaswrap'))return;
  const bc=document.querySelector('.bcanvas');if(!bc)return;
  const r=bc.getBoundingClientRect();
  addNodeAt((e.clientX-r.left)/S.zoom-40,(e.clientY-r.top)/S.zoom-16);
});

/* Erinnerungen: lokal, einmal am Tag beim Öffnen */
function remindersOn(){try{return localStorage.getItem(KEY+'_notify')==='on';}catch(e){return false;}}
function dueTodayList(){
  const out=[];const tk=TODAY_KEY;
  (DB.tasks||[]).forEach(function(t){if(t.due===tk&&t.status!=='done')out.push(t.title);});
  (DB.birthdays||[]).forEach(function(b){if(b.month===TODAY.getMonth()+1&&b.day===TODAY.getDate())out.push(b.name+' hat Geburtstag');});
  return out;
}
function updateReminderLabel(){
  const el=document.getElementById('reminders-label');if(!el)return;
  const on=remindersOn()&&('Notification'in window)&&Notification.permission==='granted';
  el.textContent=on?'Erinnerungen an':'Tägliche Erinnerungen';
}
function showNote(title,body){
  try{
    if(navigator.serviceWorker&&navigator.serviceWorker.ready){
      navigator.serviceWorker.ready.then(function(reg){reg.showNotification(title,{body:body,icon:'icon-192.png',badge:'icon-192.png'});}).catch(function(){try{new Notification(title,{body:body});}catch(e){}});
    }else{new Notification(title,{body:body});}
  }catch(e){}
}
function maybeNotify(){
  if(!remindersOn())return;
  if(!('Notification'in window)||Notification.permission!=='granted')return;
  let last='';try{last=localStorage.getItem(KEY+'_notifyday')||'';}catch(e){}
  if(last===TODAY_KEY)return;
  const items=dueTodayList();if(!items.length)return;
  const body=items.slice(0,5).join('\n')+(items.length>5?'\n+'+(items.length-5)+' weitere':'');
  showNote('Magalis Planner \u00b7 Heute',body);
  try{localStorage.setItem(KEY+'_notifyday',TODAY_KEY);}catch(e){}
}
function toggleReminders(){
  if(!('Notification'in window))return;
  if(remindersOn()){try{localStorage.setItem(KEY+'_notify','off');}catch(e){}updateReminderLabel();return;}
  Notification.requestPermission().then(function(p){
    if(p==='granted'){try{localStorage.setItem(KEY+'_notify','on');localStorage.removeItem(KEY+'_notifyday');}catch(e){}maybeNotify();}
    updateReminderLabel();
  });
}
(function(){var b=document.getElementById('btn-reminders');if(b)b.addEventListener('click',toggleReminders);updateReminderLabel();setTimeout(maybeNotify,1200);})();

document.addEventListener('wheel',e=>{

  if(!(e.ctrlKey||e.metaKey))return;
  e.preventDefault();
  zoomAt(e.clientX,e.clientY,S.zoom-e.deltaY*0.0016);
},{passive:false});

/* PWA: install hint */
(function(){
  let deferred=null;
  const hint=document.getElementById('pwahint'),txt=document.getElementById('pwahint-text'),act=document.getElementById('pwahint-act');
  const dismissed=(()=>{try{return localStorage.getItem('pwa_hint_seen')==='1';}catch(e){return false;}})();
  const standalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;
  const isMobile=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  function seen(){try{localStorage.setItem('pwa_hint_seen','1');}catch(e){}}
  document.getElementById('pwahint-x').onclick=()=>{hint.classList.remove('show');seen();};
  window.addEventListener('beforeinstallprompt',e=>{
    e.preventDefault();deferred=e;
    if(dismissed||standalone)return;
    txt.textContent='Installier diesen Planer als App auf deinem Gerät.';
    act.style.display='inline-block';
    act.onclick=async()=>{hint.classList.remove('show');seen();deferred.prompt();deferred=null;};
    hint.classList.add('show');
  });
  // iOS has no beforeinstallprompt: show manual instructions
  const isIOS=/iPhone|iPad|iPod/i.test(navigator.userAgent);
  if(isIOS && !standalone && !dismissed){
    setTimeout(()=>{txt.textContent='Tipp auf Teilen, dann "Zum Home-Bildschirm".';hint.classList.add('show');},1400);
  }
})();
render();
